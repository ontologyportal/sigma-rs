# Tag-triggered release workflow for the `sumo` CLI (sigmakee crate).
#
# Pushing a tag of the form `sigmakee-vX.Y.Z` builds the `sumo`
# binary for five target triples in parallel and uploads the
# stripped archives to the corresponding GitHub release:
#
#   * darwin-arm64   (macos-15,         Apple Silicon)
#   * darwin-x64     (macos-15-intel,   Intel)
#   * linux-x64-gnu  (ubuntu-latest,    x86_64 glibc)
#   * linux-arm64-gnu (ubuntu-24.04-arm, native arm64 runner)
#   * win32-x64      (windows-latest,   x86_64 MSVC)
#
# Unlike `sumo-lsp`, the `sumo` binary pulls in the full KB stack
# including the vampire-sys C++ backend via CMake (fetched by Cargo as an
# ordinary git dependency, no submodule checkout needed), and the Linux
# job installs `cmake` / `build-essential` explicitly.  macOS + Windows
# runners ship with CMake preinstalled.
#
# Windows is the one exception: vampire-sys's embedded C++ FFI build
# doesn't currently compile under MSVC, so the win32-x64 job builds
# with `--features ask` instead of `integrated-prover` (native
# in-process prover + external subprocess `vampire`/`e` on PATH still
# work; only the embedded/FFI `--backend embedded` option is
# unavailable on that platform). See the "no integrated-prover on
# Windows" build step below.
#
# `fail-fast: false` so a platform-specific build hiccup doesn't
# cancel the proven-good platforms.  The `ci.yml::cli-build` job
# already validates each platform's build on every push, so a
# release-time surprise is unlikely — but a stuck run on one platform
# shouldn't starve the other four artifacts.
#
# This workflow does NOT publish to crates.io; distribution is
# via GitHub-release artifacts plus `cargo install --git` for
# developers who want to build from source.
#
# The linux-x64-gnu leg additionally builds and uploads a StarExec solver
# package (see .github/scripts/build_starexec_package.sh): `ubuntu-latest`
# already *is* StarExec's execution-node platform (Linux x86_64), so this
# needs no cross-compilation. It's a separate build from the main release
# binary above (drops `integrated-prover`; see the script for why) and
# uploaded as its own release asset, not the same archive.

name: Release (sumo CLI)

on:
  push:
    tags:
      - 'sigmakee-v*'
  # Callable from the release-version.yml orchestrator: a tag pushed with the
  # default GITHUB_TOKEN deliberately does not trigger tag workflows
  # (GitHub's recursion guard), so the orchestrator invokes this one
  # directly with the tag it just created.  Manually pushed tags still
  # trigger via `push` above, unchanged.
  workflow_call:
    inputs:
      tag:
        description: The sigmakee-vX.Y.Z tag to build and release
        required: true
        type: string

permissions:
  contents: write  # needed to upload release artifacts

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build / ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target:  aarch64-apple-darwin
            os:      macos-15
            archive: tar.gz
            label:   darwin-arm64
            bin:     sumo
          - target:  x86_64-apple-darwin
            os:      macos-15-intel
            archive: tar.gz
            label:   darwin-x64
            bin:     sumo
          - target:  x86_64-unknown-linux-gnu
            os:      ubuntu-latest
            archive: tar.gz
            label:   linux-x64-gnu
            bin:     sumo
          - target:  aarch64-unknown-linux-gnu
            os:      ubuntu-24.04-arm
            archive: tar.gz
            label:   linux-arm64-gnu
            bin:     sumo
          - target:  x86_64-pc-windows-msvc
            os:      windows-latest
            archive: zip
            label:   win32-x64
            bin:     sumo.exe
    steps:
      - uses: actions/checkout@v4
        with:
          # Tag-triggered: github.ref IS the tag.  Called from the
          # orchestrator: the run's ref is the caller's branch, so check
          # out the tag it passed instead.
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve release tag + commit
        shell: bash
        run: |
          echo "RELEASE_TAG=${{ inputs.tag || github.ref_name }}" >> "${GITHUB_ENV}"
          echo "BUILD_COMMIT=$(git rev-parse HEAD)" >> "${GITHUB_ENV}"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install CMake + toolchain (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-sumo-${{ matrix.target }}

      - name: Build sumo CLI (release, --target)
        # `SUMO_BUILD_KIND=release` is embedded into the binary by
        # `crates/cli/build.rs` and read by `sumo update` to pick
        # the self-replace flow over the "you built from source —
        # rebuild" flow.  `SUMO_BUILD_COMMIT` likewise embeds the
        # release commit so `sumo update` can show useful
        # provenance even when the binary is run far from a
        # checkout.
        if: matrix.os != 'windows-latest'
        env:
          SUMO_BUILD_KIND:   release
          SUMO_BUILD_COMMIT: ${{ env.BUILD_COMMIT }}
        run: cargo build -p sigmakee --release --locked --target ${{ matrix.target }} --features integrated-prover

      - name: Build sumo CLI (release, --target, no integrated-prover on Windows)
        # vampire-sys's embedded C++ FFI build doesn't currently compile
        # under MSVC — ship the pure-Rust `ask` build instead (still fully
        # functional: native in-process prover + external subprocess
        # `vampire`/`e` on PATH via `--backend subprocess`/`e`; only the
        # embedded/FFI `--backend embedded` option is unavailable).
        if: matrix.os == 'windows-latest'
        env:
          SUMO_BUILD_KIND:   release
          SUMO_BUILD_COMMIT: ${{ env.BUILD_COMMIT }}
        run: cargo build -p sigmakee --release --locked --target ${{ matrix.target }} --no-default-features --features ask,parallel,alloc-mi

      - name: Strip binary (Unix)
        if: matrix.archive == 'tar.gz'
        run: strip target/${{ matrix.target }}/release/sumo

      - name: Stage artifact
        shell: bash
        run: |
          set -euo pipefail
          # Tag format: `sigmakee-vX.Y.Z`.  Strip the prefix so the
          # version inside the archive name is clean.
          ver="${RELEASE_TAG#sigmakee-v}"
          staging="sumo-${ver}-${{ matrix.label }}"
          mkdir "${staging}"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "${staging}/"
          # Ship the primary docs with the binary so users have a
          # self-contained tarball.  Each `|| true` guards against
          # a missing file on dev branches that haven't caught up
          # with the doc layout yet.
          cp README.md                "${staging}/" 2>/dev/null || true
          cp docs/INTEGRATION.md      "${staging}/INTEGRATION.md" 2>/dev/null || true
          echo "STAGING=${staging}" >> "${GITHUB_ENV}"

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          tar -czf "${STAGING}.tar.gz" "${STAGING}"
          shasum -a 256 "${STAGING}.tar.gz" > "${STAGING}.tar.gz.sha256"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "$env:STAGING" -DestinationPath "$env:STAGING.zip"
          Get-FileHash "$env:STAGING.zip" -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLower())  $env:STAGING.zip" } |
            Out-File -Encoding ASCII "$env:STAGING.zip.sha256"

      - name: Upload to release
        # `gh release upload` against a release created up front (by the
        # release-version.yml orchestrator, or the ensure-step below for
        # manually pushed tags).  Replaces softprops/action-gh-release:
        # its per-leg auto-create raced across the matrix and the create
        # call was observed reproducibly 503ing; uploads to an EXISTING
        # release are a separate, reliable endpoint.  --clobber makes
        # re-runs idempotent.
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Manual tag pushes reach here with no release yet.  Creation may
          # race across legs — losing the race is fine, upload appends.
          gh release view "${RELEASE_TAG}" >/dev/null 2>&1 \
            || gh release create "${RELEASE_TAG}" --verify-tag \
                 --title "${RELEASE_TAG}" --generate-notes \
            || true
          for i in 1 2 3; do
            if gh release upload "${RELEASE_TAG}" \
                 "${STAGING}.${{ matrix.archive }}" \
                 "${STAGING}.${{ matrix.archive }}.sha256" \
                 --clobber; then
              exit 0
            fi
            echo "upload attempt $i failed; retrying in 20s" >&2
            sleep 20
          done
          exit 1

      - name: Build StarExec package (linux-x64-gnu only)
        # `ubuntu-latest` is already StarExec's execution-node platform
        # (Linux x86_64) -- no --target/cross needed, a native build IS
        # the StarExec-compatible artifact. Separate cargo build from the
        # one above: different feature set (no `integrated-prover`; see
        # the script), so this recompiles `sigmakee` and its dependents,
        # not just a repackage of the existing binary.
        if: matrix.label == 'linux-x64-gnu'
        env:
          SUMO_BUILD_KIND:   release
          SUMO_BUILD_COMMIT: ${{ env.BUILD_COMMIT }}
        run: |
          set -euo pipefail
          ver="${RELEASE_TAG#sigmakee-v}"
          out="sumo-${ver}-starexec-linux-x64.tar.gz"
          .github/scripts/build_starexec_package.sh --out "${out}"
          shasum -a 256 "${out}" > "${out}.sha256"
          echo "STAREXEC_OUT=${out}" >> "${GITHUB_ENV}"

      - name: Upload StarExec package to release
        if: matrix.label == 'linux-x64-gnu'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for i in 1 2 3; do
            if gh release upload "${RELEASE_TAG}" \
                 "${STAREXEC_OUT}" "${STAREXEC_OUT}.sha256" --clobber; then
              exit 0
            fi
            echo "upload attempt $i failed; retrying in 20s" >&2
            sleep 20
          done
          exit 1
