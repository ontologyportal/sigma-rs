[workspace]
members  = ["crates/core", "crates/wasm", "crates/native"]
resolver = "2"

[workspace.package]
version     = "0.1.0"
edition     = "2021"
authors     = ["sumo-parser contributors"]
license     = "GPL-2.0"

[workspace.dependencies]
sumo-parser-core = { path = "crates/core" }
sumo-native       = { path = "crates/native" }
serde            = { version = "1", features = ["derive"] }
serde_json       = "1"
thiserror        = "2"
inline_colorization        = "0.1.6"
log                        = "0.4"
