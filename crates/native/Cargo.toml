[package]
name    = "sumo-native"
version.workspace = true
edition.workspace = true

[[bin]]
name = "sumo"
path = "src/main.rs"

[lib]
name = "sumo_native"
path = "src/lib.rs"

[features]
default = []
integrated-prover = ["sumo-kb/integrated-prover"]

[dependencies]
sumo-kb = { workspace = true, features = ["persist", "ask", "cnf", "vampire"] }
serde.workspace            = true
serde_json.workspace       = true
inline_colorization.workspace = true
log.workspace              = true
clap                       = { version = "4", features = ["derive"] }
env_logger                 = "0.11"
quick-xml = { version = "0.37", features = ["serialize", "overlapped-lists"] }
