[package]
name    = "sumo-kb"
version.workspace = true
edition.workspace = true

[features]
default = []
# LMDB-backed persistence. Pulls in heed + bincode.
persist = ["dep:heed", "dep:bincode"]
# Theorem proving via subprocess spawning (e.g. Vampire).
# NOT available on wasm32 -- enforced by compile_error! in lib.rs.
ask     = ["dep:regex"]
# CNF clausification. Can be used independently of ask or persist.
cnf     = []
# Unified Vampire prover path: builds TFF TPTP eagerly, routes both the
# subprocess and embedded prover through vampire-prover native structures.
# NOT available on wasm32 -- Vampire uses threads/fork/platform syscalls.
vampire           = ["dep:vampire-prover", "ask"]
# Embedded Vampire prover (links Vampire as a static library via CMake).
# Requires CMake 3.10+, a C++ compiler, and the vampire-lib submodule.
# NOT available on wasm32 -- Vampire uses threads/fork/platform syscalls.
integrated-prover = ["vampire"]

[dependencies]
# Always present
serde.workspace             = true
serde_json.workspace        = true
thiserror.workspace         = true
log.workspace               = true
inline_colorization.workspace = true
xxhash-rust                 = { version = "0.8.15", features = ["xxh64"] }
once_cell                   = "1.21.4"
smallvec                    = { version = "1", features = ["serde"] }

# persist feature
heed    = { version = "0.20", features = ["serde-bincode"], optional = true }
bincode = { version = "1",                                  optional = true }

# ask feature
regex   = { version = "1", optional = true }

# integrated-prover feature
vampire-prover = { path = "../vampire-rs/vampire", optional = true }

[dev-dependencies]
env_logger = "0.11"
