# GitHub Pages: the in-browser demo (always) + the SUMO regression report.
#
# Two triggers, one Pages artifact:
#   * push to main  — fast: rebuild the demo and redeploy it alongside the MOST
#                     RECENT regression report (re-fetched from the live site).
#                     The regression battery itself does NOT run on push.
#   * nightly cron / manual dispatch — run the full regression battery, rebuild
#                     the report AND the demo, and deploy both.
#
# The regression battery (only on the nightly/dispatch path):
#   * ontology  — `sumo -c --git https://github.com/ontologyportal/sumo load`
#   * SUMO tests — tests/**/*.kif.tq via the GitHub trees API + the CLI's http feature
#   * TPTP smoke — .github/scripts/fetch_tptp.py scrapes tptp.org's SeeTPTP pages
#   * vampire   — a prebuilt Linux release binary on PATH (subprocess backend + compare column)
#
# Results are published, not graded: the page diffs each run against the previous
# published run and keeps a history table (the live site's results.json/history.json
# are the storage).  The trailing `gate` job (nightly only) turns the run red when
# the run itself was unhealthy.
#
# One-time repo setup: Settings → Pages → Source: "GitHub Actions".

name: Regression Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      sumo_branch:
        description: ontologyportal/sumo branch to test against
        default: master
      tptp_budget:
        description: per-problem seconds for the TPTP smoke slice
        default: "10"
      ext_budget:
        description: per-test cap (seconds) for external prover backends
        default: "60"
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: regression-pages
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  # Bump to track a newer vprover/vampire release; must have a
  # vampire-Linux-X64.zip release asset (true from v5.0.0 on).
  VAMPIRE_VERSION: v5.0.1

jobs:
  regression:
    name: build pages
    runs-on: ubuntu-latest
    timeout-minutes: 120
    outputs:
      status: ${{ steps.status.outputs.status }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: regression-pages

      # ---- Regression battery: nightly cron / manual dispatch only ----------
      - name: Install CMake + toolchain deps (embedded Vampire FFI)
        if: github.event_name != 'push'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential

      # A standalone `vampire` binary on PATH — separate from the embedded
      # FFI build above — turns on the SUMO pool's `subprocess` backend and
      # the TPTP smoke slice's raw-vampire comparison column (see
      # ci_regression.sh). Cached by version so this is a cache hit on every
      # run except a VAMPIRE_VERSION bump.
      - name: Cache vampire binary
        if: github.event_name != 'push'
        id: cache-vampire
        uses: actions/cache@v4
        with:
          path: ~/.local/vampire-bin
          key: vampire-${{ env.VAMPIRE_VERSION }}-linux-x64

      - name: Install vampire
        if: github.event_name != 'push' && steps.cache-vampire.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/vampire-bin
          curl -fsSL -o /tmp/vampire.zip \
            "https://github.com/vprover/vampire/releases/download/${VAMPIRE_VERSION}/vampire-Linux-X64.zip"
          unzip -q /tmp/vampire.zip -d ~/.local/vampire-bin
          chmod +x ~/.local/vampire-bin/vampire

      - name: Add vampire to PATH
        if: github.event_name != 'push'
        run: |
          echo "$HOME/.local/vampire-bin" >> "$GITHUB_PATH"
          "$HOME/.local/vampire-bin/vampire" --version

      - name: Build sumo (release)
        if: github.event_name != 'push'
        run: cargo build --release --bin sumo

      # The scraped TPTP tree only changes when the problem list (or the
      # scraper) does — cache it so tptp.org is normally never touched.
      - name: Cache TPTP problem tree
        if: github.event_name != 'push'
        uses: actions/cache@v4
        with:
          path: ~/TPTP
          key: tptp-tree-${{ hashFiles('.github/scripts/tptp_regression.list', '.github/scripts/fetch_tptp.py') }}

      - name: Fetch TPTP problems (tptp.org SeeTPTP scrape, cache misses only)
        if: github.event_name != 'push'
        run: python3 .github/scripts/fetch_tptp.py --list .github/scripts/tptp_regression.list --dest ~/TPTP

      - name: Run regression (remote ontology + tests)
        if: github.event_name != 'push'
        id: regress
        continue-on-error: true
        env:
          SKIP_BUILD: "1"
          SUMO_BRANCH: ${{ inputs.sumo_branch || 'master' }}
          TPTP_BUDGET: ${{ inputs.tptp_budget || '10' }}
          EXT_BUDGET: ${{ inputs.ext_budget || '60' }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          TPTP="$HOME/TPTP" bash .github/scripts/ci_regression.sh

      - name: Report status
        if: github.event_name != 'push'
        id: status
        run: |
          status=$(cat regression-out/status 2>/dev/null || echo FAIL)
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "Regression status: $status"

      # The previous deploy's results.json/history.json seed the "changes
      # since last run" section and the history table — the site itself is
      # the storage, carried forward deploy to deploy.  Both fetches are
      # best-effort: a first run (or disabled Pages) just builds without them.
      - name: Fetch previous published results (deltas + history)
        if: github.event_name != 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p prev
          url=$(gh api "repos/$GITHUB_REPOSITORY/pages" --jq .html_url 2>/dev/null || true)
          [ -n "$url" ] || url="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}/"
          echo "pages url: $url"
          curl -fsSL "${url%/}/results.json?run=$GITHUB_RUN_ID" -o prev/results.json || true
          curl -fsSL "${url%/}/history.json?run=$GITHUB_RUN_ID" -o prev/history.json || true
          ls -la prev/ || true

      - name: Build report site
        if: github.event_name != 'push'
        run: |
          python3 .github/scripts/regression_report.py \
            --results regression-out \
            --out site \
            --prev prev/results.json \
            --history prev/history.json \
            --run-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

      - name: Upload raw results (debugging)
        if: github.event_name != 'push'
        uses: actions/upload-artifact@v4
        with:
          name: regression-out
          path: |
            regression-out
            !regression-out/work
          retention-days: 14

      # ---- Push builds: keep the most recent regression report --------------
      # No regression run on push. The report is self-contained (index.html +
      # results/history/badge json), so re-fetch it from the live Pages site
      # and republish it beside the freshly-built demo. Best-effort: on a first
      # deploy (no site yet) the report is simply absent until the next nightly.
      - name: Restore last published report
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p site
          url=$(gh api "repos/$GITHUB_REPOSITORY/pages" --jq .html_url 2>/dev/null || true)
          [ -n "$url" ] || url="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}/"
          echo "pages url: $url"
          for f in index.html results.json history.json badge.json; do
            curl -fsSL "${url%/}/$f?run=$GITHUB_RUN_ID" -o "site/$f" \
              && echo "restored $f" || echo "no prior $f (first deploy?)"
          done

      # ---- In-browser demo: every build (push + nightly) --------------------
      - name: Install wasm toolchain (for the demo)
        continue-on-error: true
        run: |
          rustup target add wasm32-unknown-unknown
          # Match the wasm-bindgen CLI to the crate version in Cargo.lock.
          WB_VER=$(grep -A1 '^name = "wasm-bindgen"$' Cargo.lock \
                   | grep '^version' | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "wasm-bindgen $WB_VER"
          cargo install wasm-bindgen-cli --version "$WB_VER" --locked
          sudo apt-get install -y binaryen   # wasm-opt (build-npm.sh uses it to shrink the .wasm)

      - name: Build & stage the in-browser demo at /browse
        id: demo
        continue-on-error: true
        run: |
          crates/wasm/build-npm.sh
          mkdir -p site/browse
          cp -R crates/wasm/web/* site/browse/       # web/pkg is gitignored / absent in CI
          rm -rf site/browse/pkg
          cp -R crates/wasm/pkg site/browse/pkg

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: deploy pages
    needs: regression
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # Turns the run red when the nightly regression itself was unhealthy (build,
  # load, enumeration, TPTP inputs) — after the page is up. Skipped on push
  # builds, which don't run the battery.
  gate:
    name: run-health gate
    if: github.event_name != 'push'
    needs: [regression, deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if regression failed
        run: |
          echo "status: ${{ needs.regression.outputs.status }}"
          test "${{ needs.regression.outputs.status }}" = "GREEN"
